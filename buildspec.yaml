version: 0.2
phases:
  pre_build:
    commands:
      - pip3 install awscli --upgrade --user
      - pip3 install jupyter --upgrade --user
  build:
    commands:
      - echo Build started on `date`
      - |
        ipynb_files=$(git ls-tree --name-only -r $CODEBUILD_RESOLVED_SOURCE_VERSION | grep '\.ipynb$')
        echo "Jupyter Notebook files in this commit:"
        echo "$ipynb_files"
        python3 build.py "$ipynb_files" $JobInfoTableName $S3LogBucketName $SageMakerRole $CODEBUILD_RESOLVED_SOURCE_VERSION
  post_build:
    commands:
      - echo Build completed on `date`
